name: Build Legion AI APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm install
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Get gradle-wrapper.jar
        run: curl -L "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: legion-ai-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
